<!DOCTYPE html>
<html>
<head>
<title>EZ Car Rental Malta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
}

header{
background:black;
color:white;
text-align:center;
padding:25px;
}

.hero{
height:80vh;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:45px;
font-weight:bold;
text-shadow:2px 2px 15px rgba(0,0,0,0.7);
}

.section{
padding:60px 20px;
text-align:center;
max-width:1100px;
margin:auto;
}

.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.car{
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
overflow:hidden;
}

.car img{
width:100%;
height:200px;
object-fit:cover;
}

.car-content{
padding:20px;
}

button{
background:black;
color:white;
border:none;
padding:10px 25px;
border-radius:6px;
cursor:pointer;
}

footer{
background:black;
color:white;
text-align:center;
padding:25px;
margin-top:60px;
}
</style>
</head>

<body>

<header>
<h1>EZ Car Rental Malta</h1>
<p>Affordable & Reliable Car Hire</p>
</header>

<div class="hero" style="background-image:url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD...')">
Drive Malta With Us
</div>

<div class="section">
<h2>Our Cars</h2>

<div class="cars">

<div class="car">
<img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD...">
<div class="car-content">
<h3>Toyota Aygo</h3>
<p>From €25/day</p>
<button>Book Now</button>
</div>
</div>

<div class="car">
<img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD...">
<div class="car-content">
<h3>Toyota Yaris</h3>
<p>From €30/day</p>
<button>Book Now</button>
</div>
</div>

</div>
</div>

<footer>
© 2026 EZ Car Rental Malta
</footer>

</body>
</html>
