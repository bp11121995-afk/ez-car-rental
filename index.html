<!DOCTYPE html>
<html>
<head>
<title>EZ Car Rental Malta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

header{
background:black;
color:white;
text-align:center;
padding:25px;
}

.hero{
background:url('https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/hero.jpg') center/cover no-repeat;
height:75vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
}

.section{
padding:60px 20px;
text-align:center;
}

.cars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.car{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.car img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:12px 25px;
margin-top:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

footer{
background:black;
color:white;
text-align:center;
padding:25px;
margin-top:60px;
}
</style>
</head>

<body>

<header>
<h1>EZ Car Rental Malta</h1>
<p>Affordable & Reliable Car Hire</p>
</header>

<div class="hero">
Drive Malta With Us
</div>

<div class="section">
<h2>Our Cars</h2>

<div class="cars">

<div class="car">
<img src="https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/aygo.jpg">
<h3>Toyota Aygo</h3>
<p>From €25/day</p>
<button>Book Now</button>
</div>

<div class="car">
<img src="https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/yaris.jpg">
<h3>Toyota Yaris</h3>
<p>From €30/day</p>
<button>Book Now</button>
</div>

<div class="car">
<img src="https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/polo.jpg">
<h3>Volkswagen Polo</h3>
<p>From €35/day</p>
<button>Book Now</button>
</div>

<div class="car">
<img src="https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/qashqai.jpg">
<h3>Nissan Qashqai</h3>
<p>From €45/day</p>
<button>Book Now</button>
</div>

<div class="car">
<img src="https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/peugeot5008.jpg">
<h3>Peugeot 5008</h3>
<p>From €55/day</p>
<button>Book Now</button>
</div>

<div class="car">
<img src="https://raw.githubusercontent.com/bp11121995-afk/ez-car-rental/main/images/expert.jpg">
<h3>Peugeot Expert</h3>
<p>From €60/day</p>
<button>Book Now</button>
</div>

</div>
</div>

<footer>
© 2026 EZ Car Rental Malta
</footer>

</body>
</html>
